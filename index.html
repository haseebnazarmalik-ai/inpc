<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INPC Cloud - Locked</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --accent: #2980b9; --gold: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Preloader to prevent Login Screen Flicker */
        #preloader { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Auth Screen */
        #auth-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--primary); color: white; text-align: center; padding: 20px; }
        .login-btn { padding: 15px 40px; font-size: 18px; cursor: pointer; background: white; color: var(--primary); border: none; border-radius: 8px; font-weight: bold; }

        /* Mobile Dashboard Optimizations */
        #app-content { display: none; padding: 10px; }
        .container { max-width: 1250px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .user-info { font-size: 12px; display: flex; align-items: center; gap: 8px; }

        .main-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .main-card { padding: 15px 10px; border-radius: 10px; text-align: center; color: white; background: var(--primary); }
        .main-card h3 { font-size: 10px; margin: 0; opacity: 0.8; }
        .main-card .value { font-size: 18px; font-weight: bold; color: var(--gold); margin-top: 5px; }
        .main-card.blue { background: var(--accent); }

        /* Form Mobile View */
        .form-section { display: flex; flex-direction: column; gap: 12px; background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .input-group { display: flex; flex-direction: column; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .add-btn { width: 100%; padding: 14px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; }

        /* Responsive Table */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; font-size: 13px; }
        th { background: var(--primary); color: white; padding: 10px; text-align: left; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; }

        .year-summary-footer { background: #f8f9fa; padding: 12px; display: flex; justify-content: space-between; font-size: 12px; border-top: 1px solid #ddd; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; }
        .running { background: #e3f2fd; color: #1976d2; }
        .matured { background: #eee; color: #777; }
        .del-btn { background: var(--danger); color: white; border: none; padding: 6px; border-radius: 4px; font-size: 11px; }

        @media (max-width: 480px) {
            .main-card .value { font-size: 16px; }
            h2 { font-size: 18px; }
        }
    </style>
</head>
<body>

<div id="preloader"><div class="spinner"></div></div>

<div id="auth-screen">
    <h1>INPC Manager</h1>
    <p>Secure Cloud Tracking</p><br>
    <button class="login-btn" onclick="login()">Login with Google</button>
</div>

<div id="app-content">
    <div class="container">
        <header>
            <h2>INPC Dashboard</h2>
            <div id="user-display" class="user-info"></div>
        </header>

        <div class="main-dashboard">
            <div class="main-card"><h3>TOTAL PROFIT</h3><div class="value" id="grandProfit">0.00</div></div>
            <div class="main-card blue"><h3>ACTIVE INV</h3><div class="value" id="activeInv">0.00</div></div>
        </div>

        <div class="form-section">
            <div class="input-group"><input type="date" id="pDate"></div>
            <div class="input-group"><input type="number" id="pAmount" placeholder="Amount (PKR)"></div>
            <button class="add-btn" onclick="addEntry()">Add Certificate</button>
        </div>

        <div id="tablesContainer"></div>
    </div>
</div>

<script>
    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    const firebaseConfig = {
        apiKey: "AIzaSyCr380i_b2FN0yhNRD-PqDdSxttQO9O9Xk",
        authDomain: "inpc-1fad6.firebaseapp.com",
        projectId: "inpc-1fad6",
        storageBucket: "inpc-1fad6.firebasestorage.app",
        messagingSenderId: "948916296204",
        appId: "1:948916296204:web:083855205078a9f20c6c29",
        databaseURL: "https://inpc-1fad6-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let currentUser = null;

    auth.onAuthStateChanged(user => {
        document.getElementById('preloader').style.display = 'none'; // Hide loader
        if (user) {
            currentUser = user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('user-display').innerHTML = `<span>${user.displayName.split(' ')[0]}</span> <button class="logout-btn" onclick="logout()">X</button>`;
            
            const localData = JSON.parse(localStorage.getItem('inpc_cloud_db')) || [];
            renderTables(localData);
            syncFromFirebase();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut(); }

    function syncFromFirebase() {
        db.ref('inpc_records/' + currentUser.uid).on('value', snapshot => {
            const records = snapshot.val() ? Object.values(snapshot.val()) : [];
            localStorage.setItem('inpc_cloud_db', JSON.stringify(records));
            renderTables(records);
        });
    }

    function addEntry() {
        const date = document.getElementById('pDate').value;
        const amount = document.getElementById('pAmount').value;
        if (!date || !amount) return;
        const id = Date.now();
        db.ref('inpc_records/' + currentUser.uid + '/' + id).set({ id, date, amount: parseFloat(amount) });
        document.getElementById('pAmount').value = '';
    }

    function deleteEntry(id) { if(confirm("Delete?")) db.ref('inpc_records/' + currentUser.uid + '/' + id).remove(); }

    function getTaxYear(date) {
        const d = new Date(date);
        return (d.getMonth() >= 6) ? `Tax Year ${d.getFullYear()}-${d.getFullYear() + 1}` : `Tax Year ${d.getFullYear() - 1}-${d.getFullYear()}`;
    }

    function renderTables(records) {
        const container = document.getElementById('tablesContainer');
        container.innerHTML = '';
        let totalP = 0, totalA = 0;
        const grouped = {};
        const today = new Date(); today.setHours(0,0,0,0);
        const cutOffDate = new Date('2025-06-01');

        records.forEach(item => {
            let dMat = new Date(item.date); dMat.setDate(dMat.getDate() + 90);
            if (dMat.getDay() === 6) dMat.setDate(dMat.getDate() + 2);
            else if (dMat.getDay() === 0) dMat.setDate(dMat.getDate() + 1);
            dMat.setHours(0,0,0,0);

            let rate = (dMat < cutOffDate) ? (4.66) : (2.9955);
            let pAmt = (item.amount * (rate / 100));
            totalP += pAmt;

            const diff = Math.round((dMat - today) / 86400000);
            if (diff >= 0) totalA += item.amount;

            const year = getTaxYear(dMat);
            if (!grouped[year]) grouped[year] = [];
            grouped[year].push({ ...item, dMat, diff, pAmt });
        });

        Object.keys(grouped).sort().reverse().forEach(year => {
            let yA = 0, yP = 0;
            let html = `<div class="tax-year-container"><div class="tax-year-header">${year}</div><div class="table-wrapper"><table><thead><tr><th>Date</th><th>Amount</th><th>Maturity</th><th>Profit</th><th>Action</th></tr></thead><tbody>`;
            grouped[year].forEach(r => {
                yP += r.pAmt; if(r.diff >= 0) yA += r.amount;
                html += `<tr><td>${new Date(r.date).toLocaleDateString('en-GB')}</td><td>${r.amount.toLocaleString()}</td><td>${r.dMat.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}</td><td>${r.pAmt.toFixed(0)}</td><td><button class="del-btn" onclick="deleteEntry(${r.id})">X</button></td></tr>`;
            });
            container.innerHTML += html + `</tbody></table></div><div class="year-summary-footer"><span>Active: ${yA.toLocaleString()}</span><span>Profit: ${yP.toFixed(0)}</span></div></div>`;
        });
        document.getElementById('grandProfit').innerText = totalP.toLocaleString(undefined,{minimumFractionDigits:2});
        document.getElementById('activeInv').innerText = totalA.toLocaleString();
        document.getElementById('pDate').valueAsDate = new Date();
    }
</script>
</body>
</html>
