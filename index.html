<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INPC Portfolio Manager - Cloud Locked</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --accent: #2980b9; --gold: #f1c40f; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 0; }
        
        /* Auth Screen */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--primary); color: white; text-align: center; padding: 20px; }
        .login-btn { padding: 15px 40px; font-size: 18px; cursor: pointer; background: white; color: var(--primary); border: none; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

        /* Main App Content */
        #app-content { display: none; padding: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .container { max-width: 1250px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .user-info { display: flex; align-items: center; gap: 15px; font-weight: bold; color: var(--primary); }
        .logout-btn { background: #555; color: white; border: none; padding: 7px 15px; border-radius: 5px; cursor: pointer; font-size: 13px; }

        /* Dashboard Stats */
        .main-dashboard { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .main-card { flex: 1; min-width: 300px; background: var(--primary); color: white; padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .main-card h3 { margin: 0; font-size: 14px; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }
        .main-card .value { font-size: 32px; font-weight: bold; margin-top: 10px; color: var(--gold); }
        .main-card.blue { background: var(--accent); }

        /* Input Form */
        .form-section { display: flex; gap: 15px; background: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 30px; flex-wrap: wrap; align-items: flex-end; border: 1px solid #eee; }
        .input-group { display: flex; flex-direction: column; flex: 1; min-width: 200px; }
        label { font-weight: bold; margin-bottom: 8px; color: #444; font-size: 14px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--success); box-shadow: 0 0 5px rgba(39, 174, 96, 0.2); }
        .add-btn { background-color: var(--success); color: white; border: none; padding: 12px 35px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        .add-btn:hover { background-color: #219150; }

        /* Tax Year Tables */
        .tax-year-container { margin-top: 40px; border-radius: 10px; border: 1px solid #ddd; overflow: hidden; background: white; }
        .tax-year-header { background: #f1f1f1; padding: 15px 20px; font-weight: bold; color: var(--primary); font-size: 20px; border-bottom: 2px solid #ddd; }
        
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background-color: var(--primary); color: white; padding: 15px; text-align: left; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; color: #333; }
        tr:hover { background-color: #fcfcfc; }
        
        .year-summary-footer { background: #f8f9fa; padding: 15px 25px; display: flex; justify-content: flex-end; gap: 40px; border-top: 2px solid #eee; }
        .summary-item { text-align: right; }
        .summary-label { font-size: 11px; color: #777; font-weight: bold; text-transform: uppercase; }
        .summary-value { font-size: 18px; font-weight: bold; color: var(--primary); margin-top: 3px; }
        .profit-text { color: var(--success); }

        /* Status Badges */
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; display: inline-block; }
        .running { background: #e3f2fd; color: #1976d2; }
        .matured { background: #f5f5f5; color: #999; }
        .today-badge { background: #e8f5e9; color: #1b5e20; border: 1px solid #1b5e20; }
        .del-btn { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .del-btn:hover { background: #c0392b; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1>INPC Portfolio Manager</h1>
    <p>Secure Cloud Storage & Real-time Tracking</p><br>
    <button class="login-btn" onclick="login()">Login with Google</button>
</div>

<div id="app-content">
    <div class="container">
        <header>
            <h2>INPC Dashboard</h2>
            <div id="user-display" class="user-info"></div>
        </header>

        <div class="main-dashboard">
            <div class="main-card">
                <h3>Total All Year Profit</h3>
                <div class="value" id="grandProfit">0.00</div>
            </div>
            <div class="main-card blue">
                <h3>Total Active Investment</h3>
                <div class="value" id="activeInv">0.00</div>
            </div>
        </div>

        <div class="form-section">
            <div class="input-group">
                <label>Purchase Date</label>
                <input type="date" id="pDate">
            </div>
            <div class="input-group">
                <label>Investment Amount</label>
                <input type="number" id="pAmount" placeholder="Enter PKR Amount">
            </div>
            <button class="add-btn" onclick="addEntry()">Add Certificate</button>
        </div>

        <div id="tablesContainer"></div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCr380i_b2FN0yhNRD-PqDdSxttQO9O9Xk",
        authDomain: "inpc-1fad6.firebaseapp.com",
        projectId: "inpc-1fad6",
        storageBucket: "inpc-1fad6.firebasestorage.app",
        messagingSenderId: "948916296204",
        appId: "1:948916296204:web:083855205078a9f20c6c29",
        databaseURL: "https://inpc-1fad6-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let currentUser = null;

    // --- AUTHENTICATION ---
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('user-display').innerHTML = `
                <span>${user.displayName}</span>
                <button class="logout-btn" onclick="logout()">Logout</button>`;
            
            // Initial render from Local Storage for speed
            const localData = JSON.parse(localStorage.getItem('inpc_cloud_db')) || [];
            renderTables(localData);
            
            // Sync with Firebase
            syncFromFirebase();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider);
    }

    function logout() {
        auth.signOut();
    }

    // --- DATA HANDLING ---
    function syncFromFirebase() {
        db.ref('inpc_records/' + currentUser.uid).on('value', snapshot => {
            const data = snapshot.val();
            const records = data ? Object.values(data) : [];
            localStorage.setItem('inpc_cloud_db', JSON.stringify(records));
            renderTables(records);
        });
    }

    function addEntry() {
        const dateInput = document.getElementById('pDate').value;
        const amountInput = document.getElementById('pAmount').value;
        if (!dateInput || !amountInput) return alert("Meharbani karke dono fields bharien!");

        const newId = Date.now();
        const record = { id: newId, date: dateInput, amount: parseFloat(amountInput) };

        // Save only to Firebase (Listener will handle rendering)
        db.ref('inpc_records/' + currentUser.uid + '/' + newId).set(record);
        document.getElementById('pAmount').value = '';
    }

    function deleteEntry(id) {
        if (!confirm("Kya aap waqai ye entry delete karna chahte hain?")) return;
        db.ref('inpc_records/' + currentUser.uid + '/' + id).remove();
    }

    // --- LOGIC & RENDERING ---
    function getTaxYear(date) {
        const d = new Date(date);
        return (d.getMonth() >= 6) ? `Tax Year ${d.getFullYear()}-${d.getFullYear() + 1}` : `Tax Year ${d.getFullYear() - 1}-${d.getFullYear()}`;
    }

    function renderTables(records) {
        const container = document.getElementById('tablesContainer');
        container.innerHTML = '';
        
        let overallGrandProfit = 0;
        let overallActiveInv = 0;
        const grouped = {};
        const today = new Date(); today.setHours(0,0,0,0);
        const cutOffDate = new Date('2025-06-01');

        records.forEach(item => {
            let dMat = new Date(item.date);
            dMat.setDate(dMat.getDate() + 90);
            
            // Monday Adjustment
            if (dMat.getDay() === 6) dMat.setDate(dMat.getDate() + 2);
            else if (dMat.getDay() === 0) dMat.setDate(dMat.getDate() + 1);
            dMat.setHours(0,0,0,0);

            // Dual Rate Profit Logic
            let profitRate = (dMat < cutOffDate) ? (1.55333 * 3) : (0.9985 * 3);
            let profitAmt = (item.amount * (profitRate / 100));
            overallGrandProfit += profitAmt;

            const diffDays = Math.round((dMat - today) / (1000 * 60 * 60 * 24));
            if (diffDays >= 0) overallActiveInv += item.amount;

            const taxYear = getTaxYear(dMat);
            if (!grouped[taxYear]) grouped[taxYear] = [];
            grouped[taxYear].push({ ...item, dMat, diffDays, profitAmt });
        });

        // Display Tables (Recent Tax Year first)
        Object.keys(grouped).sort().reverse().forEach(year => {
            let yearActive = 0, yearProfit = 0;
            let html = `
                <div class="tax-year-container">
                    <div class="tax-year-header">${year}</div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Purchase Date</th>
                                    <th>Amount</th>
                                    <th>Maturity Date</th>
                                    <th>Day</th>
                                    <th>Profit</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>`;

            grouped[year].forEach(r => {
                yearProfit += r.profitAmt;
                if (r.diffDays >= 0) yearActive += r.amount;

                let badge = r.diffDays > 0 ? `<span class="badge running">${r.diffDays} Days Left</span>` : 
                            (r.diffDays === 0 ? `<span class="badge today-badge">Today!</span>` : `<span class="badge matured">Matured</span>`);

                html += `
                    <tr>
                        <td>${new Date(r.date).toLocaleDateString('en-GB')}</td>
                        <td>${r.amount.toLocaleString()}</td>
                        <td>${r.dMat.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'})}</td>
                        <td>${r.dMat.toLocaleDateString('en-GB', {weekday: 'long'})}</td>
                        <td>${r.profitAmt.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                        <td>${badge}</td>
                        <td><button class="del-btn" onclick="deleteEntry(${r.id})">Delete</button></td>
                    </tr>`;
            });

            html += `
                        </tbody>
                    </table>
                </div>
                <div class="year-summary-footer">
                    <div class="summary-item">
                        <div class="summary-label">Active Invested</div>
                        <div class="summary-value">${yearActive.toLocaleString()}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Yearly Total Profit</div>
                        <div class="summary-value profit-text">${yearProfit.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                    </div>
                </div>
            </div>`;
            container.innerHTML += html;
        });

        // Update Top Cards
        document.getElementById('grandProfit').innerText = overallGrandProfit.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('activeInv').innerText = overallActiveInv.toLocaleString();
        document.getElementById('pDate').valueAsDate = new Date();
    }
</script>

</body>
</html>
