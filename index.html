<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INPC Portfolio Manager - Firebase Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --accent: #2980b9; --gold: #f1c40f; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 0; }
        
        /* Auth Screen */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--primary); color: white; }
        .login-btn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: white; color: var(--primary); border: none; border-radius: 8px; font-weight: bold; }

        /* Main App */
        #app-content { display: none; padding: 20px; }
        .container { max-width: 1250px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .logout-btn { background: #555; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }

        .main-dashboard { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .main-card { flex: 1; min-width: 300px; background: var(--primary); color: white; padding: 25px; border-radius: 12px; text-align: center; }
        .main-card .value { font-size: 32px; font-weight: bold; margin-top: 10px; color: var(--gold); }
        .main-card.blue { background: var(--accent); }

        .form-section { display: flex; gap: 15px; background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 25px; align-items: flex-end; border: 1px solid #eee; }
        .input-group { display: flex; flex-direction: column; flex: 1; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .add-btn { background-color: var(--success); color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .tax-year-container { margin-top: 40px; border-radius: 10px; border: 1px solid #ddd; overflow: hidden; background: white; }
        .tax-year-header { background: #f1f1f1; padding: 15px 20px; font-weight: bold; color: var(--primary); font-size: 20px; border-bottom: 2px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: var(--primary); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .year-summary-footer { background: #f8f9fa; padding: 15px 25px; display: flex; justify-content: flex-end; gap: 40px; border-top: 2px solid #eee; font-weight: bold; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .running { background: #e3f2fd; color: #1976d2; }
        .matured { background: #f5f5f5; color: #999; }
        .del-btn { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1>INPC Manager</h1>
    <p>Please login with Google to continue</p>
    <button class="login-btn" onclick="login()">Login with Google</button>
</div>

<div id="app-content">
    <div class="container">
        <header>
            <h2>INPC Cloud Dashboard</h2>
            <div class="user-info" id="user-display"></div>
        </header>

        <div class="main-dashboard">
            <div class="main-card">
                <h3>Total All Year Profit</h3>
                <div class="value" id="grandProfit">0.00</div>
            </div>
            <div class="main-card blue">
                <h3>Total Active Investment</h3>
                <div class="value" id="activeInv">0.00</div>
            </div>
        </div>

        <div class="form-section">
            <div class="input-group">
                <label>Purchase Date</label>
                <input type="date" id="pDate">
            </div>
            <div class="input-group">
                <label>Amount</label>
                <input type="number" id="pAmount" placeholder="Amount">
            </div>
            <button class="add-btn" onclick="addEntry()">Add Certificate</button>
        </div>

        <div id="tablesContainer"></div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCr380i_b2FN0yhNRD-PqDdSxttQO9O9Xk",
        authDomain: "inpc-1fad6.firebaseapp.com",
        projectId: "inpc-1fad6",
        storageBucket: "inpc-1fad6.firebasestorage.app",
        messagingSenderId: "948916296204",
        appId: "1:948916296204:web:083855205078a9f20c6c29",
        databaseURL: "https://inpc-1fad6-default-rtdb.firebaseio.com/" // Ensure this matches your console
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let currentUser = null;

    // --- AUTH LOGIC ---
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('user-display').innerHTML = `
                <span>${user.displayName}</span>
                <button class="logout-btn" onclick="logout()">Logout</button>`;
            
            // Step 1: Load from Local Storage (Fast)
            renderTables(); 
            // Step 2: Sync from Firebase (Cloud)
            syncFromFirebase();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider);
    }

    function logout() {
        auth.signOut();
    }

    // --- DATA LOGIC ---
    function syncFromFirebase() {
        db.ref('inpc_records/' + currentUser.uid).on('value', snapshot => {
            const data = snapshot.val();
            const records = data ? Object.values(data) : [];
            localStorage.setItem('inpc_locked_db', JSON.stringify(records));
            renderTables();
        });
    }

    function addEntry() {
        const dateInput = document.getElementById('pDate').value;
        const amountInput = document.getElementById('pAmount').value;
        if (!dateInput || !amountInput) return alert("Fill data!");

        const newId = Date.now();
        const record = { id: newId, date: dateInput, amount: parseFloat(amountInput) };

        // Save to Firebase
        db.ref('inpc_records/' + currentUser.uid + '/' + newId).set(record);
        
        // Save to Local for instant update
        let localDb = JSON.parse(localStorage.getItem('inpc_locked_db')) || [];
        localDb.push(record);
        localStorage.setItem('inpc_locked_db', JSON.stringify(localDb));
        
        document.getElementById('pAmount').value = '';
        renderTables();
    }

    function deleteEntry(id) {
        if (!confirm("Delete?")) return;
        db.ref('inpc_records/' + currentUser.uid + '/' + id).remove();
        let localDb = JSON.parse(localStorage.getItem('inpc_locked_db')) || [];
        localStorage.setItem('inpc_locked_db', JSON.stringify(localDb.filter(r => r.id !== id)));
        renderTables();
    }

    // --- RENDER LOGIC (LOCKED) ---
    function getTaxYear(date) {
        const d = new Date(date);
        return (d.getMonth() >= 6) ? `Tax Year ${d.getFullYear()}-${d.getFullYear() + 1}` : `Tax Year ${d.getFullYear() - 1}-${d.getFullYear()}`;
    }

    function renderTables() {
        const container = document.getElementById('tablesContainer');
        const localData = JSON.parse(localStorage.getItem('inpc_locked_db')) || [];
        container.innerHTML = '';
        
        let overallGrandProfit = 0;
        let overallActiveInv = 0;
        const grouped = {};
        const today = new Date(); today.setHours(0,0,0,0);
        const cutOffDate = new Date('2025-06-01');

        localData.forEach(item => {
            let dMat = new Date(item.date);
            dMat.setDate(dMat.getDate() + 90);
            if (dMat.getDay() === 6) dMat.setDate(dMat.getDate() + 2);
            else if (dMat.getDay() === 0) dMat.setDate(dMat.getDate() + 1);
            dMat.setHours(0,0,0,0);

            let profitRate = (dMat < cutOffDate) ? (4.66) : (2.9955); // Pre-calculated x3
            let profitAmt = (item.amount * (profitRate / 100));
            overallGrandProfit += profitAmt;

            const diffDays = Math.round((dMat - today) / (1000 * 60 * 60 * 24));
            if (diffDays >= 0) overallActiveInv += item.amount;

            const taxYear = getTaxYear(dMat);
            if (!grouped[taxYear]) grouped[taxYear] = [];
            grouped[taxYear].push({ ...item, dMat, diffDays, profitAmt });
        });

        Object.keys(grouped).sort().reverse().forEach(year => {
            let yearActive = 0, yearProfit = 0;
            let html = `<div class="tax-year-container"><div class="tax-year-header">${year}</div><table><thead><tr><th>Purchase</th><th>Amount</th><th>Maturity</th><th>Day</th><th>Profit</th><th>Status</th><th>Action</th></tr></thead><tbody>`;

            grouped[year].forEach(r => {
                yearProfit += r.profitAmt;
                if (r.diffDays >= 0) yearActive += r.amount;
                let badge = r.diffDays > 0 ? `<span class="badge running">${r.diffDays} Days Left</span>` : (r.diffDays === 0 ? `<span class="badge" style="background:#e8f5e9;color:#1b5e20;">Today!</span>` : `<span class="badge matured">Matured</span>`);
                
                html += `<tr>
                    <td>${new Date(r.date).toLocaleDateString('en-GB')}</td>
                    <td>${r.amount.toLocaleString()}</td>
                    <td>${r.dMat.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'})}</td>
                    <td>${r.dMat.toLocaleDateString('en-GB', {weekday: 'long'})}</td>
                    <td>${r.profitAmt.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td>${badge}</td>
                    <td><button class="del-btn" onclick="deleteEntry(${r.id})">Del</button></td>
                </tr>`;
            });
            container.innerHTML += html + `</tbody></table><div class="year-summary-footer"><div>Active: ${yearActive.toLocaleString()} | Profit: ${yearTotalProfit = yearProfit.toLocaleString(undefined, {minimumFractionDigits: 2})}</div></div></div>`;
        });

        document.getElementById('grandProfit').innerText = overallGrandProfit.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('activeInv').innerText = overallActiveInv.toLocaleString();
        document.getElementById('pDate').valueAsDate = new Date();
    }
</script>
</body>
</html>
